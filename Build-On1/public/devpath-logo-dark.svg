<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none">
  <defs>
    <linearGradient id="grad-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Icon: upward path / route arrow -->
  <g>
    <!-- Track lines -->
    <rect x="8" y="32" width="6" height="18" rx="3" fill="url(#grad-dark)" opacity="0.3"/>
    <rect x="18" y="22" width="6" height="28" rx="3" fill="url(#grad-dark)" opacity="0.55"/>
    <rect x="28" y="12" width="6" height="38" rx="3" fill="url(#grad-dark)"/>
    <!-- Upward arrow head -->
    <polygon points="31,4 24,14 38,14" fill="url(#grad-dark)"/>
  </g>
  <!-- Wordmark -->
  <text x="50" y="36" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-weight="800" font-size="24" fill="#e2e8f0" letter-spacing="-0.5">Dev</text>
  <text x="96" y="36" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-weight="800" font-size="24" fill="#a78bfa" letter-spacing="-0.5">Path</text>
</svg>
